name: Wapiti - DAST Web Vulnerability Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wapiti-scan:
    runs-on: ubuntu-latest
    name: Wapiti DAST Scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flask and Wapiti
        run: |
          python -m pip install --upgrade pip
          pip install flask wapiti3

      - name: Start vulnerable demo app
        run: |
          nohup python vuln_app.py &
          echo "Waiting for Flask to start..."
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:5000/ > /dev/null; then
              echo "Flask is up!"
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 2
          done

      - name: Run Wapiti scan
        run: |
          mkdir -p wapiti-report
          wapiti \
            -u http://127.0.0.1:5000/ \
            --scope folder \
            -m xss,sql,exec,cookieflags,redirect,csrf \
            -f json \
            -o wapiti-report/report.json \
            --flush-session \
            --no-bugreport \
            -v 2 \
            --max-links-per-page 50 \
            -d 3 \
            -t 10 \
            2>&1 | tee wapiti-report/scan.log || true

      - name: Generate HTML report
        if: always()
        run: |
          wapiti \
            -u http://127.0.0.1:5000/ \
            --scope folder \
            -m xss,sql,exec,cookieflags,redirect,csrf \
            -f html \
            -o wapiti-report/report.html \
            --flush-session \
            --no-bugreport \
            --max-links-per-page 50 \
            -d 3 \
            -t 10 \
            2>/dev/null || true

      - name: Print Vulnerability Summary
        if: always()
        run: |
          echo "========================================"
          echo "       Wapiti Vulnerability Summary     "
          echo "========================================"
          if [ -f wapiti-report/report.json ]; then
            python3 -c "
          import json, os
          with open('wapiti-report/report.json') as f:
              report = json.load(f)
          vulns = report.get('vulnerabilities', {})
          total = 0
          for category, items in vulns.items():
              count = len(items) if isinstance(items, list) else 0
              if count > 0:
                  print(f'  [{count}] {category}')
                  total += count
          if total == 0:
              print('  No vulnerabilities found in JSON report.')
          else:
              print(f'  Total: {total} findings')
          "
          else
            echo "  report.json not found, check scan.log"
            cat wapiti-report/scan.log 2>/dev/null || true
          fi

      - name: Upload Wapiti Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wapiti-report
          path: wapiti-report/
          retention-days: 30
          if-no-files-found: warn
