name: Snyk - Dependency & Code Vulnerability Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to GitHub Security tab

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    name: Snyk Security Scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # -------------------------------------------------------
      # 1. Dependency vulnerability scan (Open Source)
      #    Scans requirements.txt for known CVEs
      # -------------------------------------------------------
      - name: Snyk Open Source - Dependency Scan
        continue-on-error: true
        run: |
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --severity-threshold=medium \
            --sarif-file-output=snyk-oss.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload OSS Results to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-open-source
        continue-on-error: true

      # -------------------------------------------------------
      # 2. SAST - Static code analysis
      #    Scans Python source code for security issues
      # -------------------------------------------------------
      - name: Snyk Code - SAST Scan
        continue-on-error: true
        run: |
          snyk code test \
            --severity-threshold=medium \
            --sarif-file-output=snyk-code.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload SAST Results to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
        continue-on-error: true
