name: Snyk - Dependency & Code Vulnerability Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to GitHub Security tab

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    name: Snyk Security Scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --only-binary=:all: || \
          pip install -r requirements.txt --no-build-isolation

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # -------------------------------------------------------
      # 1. Dependency vulnerability scan (Open Source)
      #    Scans requirements.txt for known CVEs
      # -------------------------------------------------------
      - name: Snyk Open Source - Dependency Scan
        continue-on-error: true
        run: |
          if [ ! -f requirements.txt ]; then
            echo "requirements.txt not found, skipping OSS dependency scan"
            exit 0
          fi
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --severity-threshold=medium \
            --sarif-file-output=snyk-oss.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload OSS Results to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-open-source
        continue-on-error: true

      # -------------------------------------------------------
      # 2. SAST - Snyk Code (requires Snyk Code enabled in org)
      #    To enable: app.snyk.io → Settings → Snyk Code → ON
      # -------------------------------------------------------
      # - name: Snyk Code - SAST Scan
      #   continue-on-error: true
      #   run: snyk code test --sarif-file-output=snyk-code.sarif
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
