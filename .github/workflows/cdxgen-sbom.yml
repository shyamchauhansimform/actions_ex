name: SBOM Generation - cdxgen (CycloneDX)

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results to GitHub Security tab

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    name: Generate Software Bill of Materials (SBOM)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cdxgen
        run: npm install -g @cyclonedx/cdxgen

      - name: Generate SBOM (Python project)
        run: |
          cdxgen -t python \
            --evidence \
            --bom-audit \
            --spec-version 1.5 \
            -o bom.json \
            .
        env:
          FETCH_LICENSE: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display SBOM Summary
        if: always()
        run: |
          echo "========================================"
          echo "        cdxgen SBOM Summary             "
          echo "========================================"
          if [ -f bom.json ]; then
            echo "BOM file generated successfully"
            echo ""
            echo "--- Metadata ---"
            python3 -c "
          import json, sys
          with open('bom.json') as f:
              bom = json.load(f)
          meta = bom.get('metadata', {})
          components = bom.get('components', [])
          vulns = bom.get('vulnerabilities', [])
          print(f'Spec version  : {bom.get(\"specVersion\", \"N/A\")}')
          print(f'BOM version   : {bom.get(\"version\", \"N/A\")}')
          print(f'Components    : {len(components)}')
          print(f'Vulnerabilities: {len(vulns)}')
          if components:
              print('')
              print('--- Components ---')
              for c in components[:20]:
                  print(f'  {c.get(\"name\",\"?\")} @ {c.get(\"version\",\"?\")} [{c.get(\"type\",\"?\")}]')
              if len(components) > 20:
                  print(f'  ... and {len(components)-20} more')
          "
          else
            echo "WARNING: bom.json was not generated"
          fi

      - name: Validate SBOM with cdx-validate
        if: always()
        run: |
          if [ -f bom.json ]; then
            echo "Running cdx-validate..."
            npx --yes @cyclonedx/cdxgen cdx-validate -i bom.json || true
          fi

      - name: Upload SBOM Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: bom.json
          retention-days: 30
          if-no-files-found: warn

      # -------------------------------------------------------
      # Vulnerability scan: run Trivy against the generated SBOM
      # Results appear in GitHub → Security → Code scanning
      # -------------------------------------------------------
      - name: Scan SBOM for Vulnerabilities (Trivy)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "sbom"
          scan-ref: "bom.json"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"   # Don't fail the build; report only

      - name: Upload Trivy Scan Results to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "sbom-vulnerability-scan"

      - name: Print Vulnerability Summary
        if: always()
        run: |
          echo "========================================"
          echo "      Trivy Vulnerability Summary       "
          echo "========================================"
          if [ -f trivy-results.sarif ]; then
            python3 -c "
          import json
          with open('trivy-results.sarif') as f:
              sarif = json.load(f)
          results = []
          for run in sarif.get('runs', []):
              results.extend(run.get('results', []))
          if not results:
              print('No vulnerabilities found!')
          else:
              print(f'Total findings: {len(results)}')
              sev = {}
              for r in results:
                  level = r.get('level', 'unknown')
                  sev[level] = sev.get(level, 0) + 1
              for level, count in sorted(sev.items()):
                  print(f'  {level.upper()}: {count}')
              print('')
              print('Top findings:')
              for r in results[:10]:
                  rule_id = r.get('ruleId', '?')
                  msg = r.get('message', {}).get('text', '')[:80]
                  print(f'  [{rule_id}] {msg}')
              if len(results) > 10:
                  print(f'  ... and {len(results)-10} more (see GitHub Security tab)')
          "
          fi
